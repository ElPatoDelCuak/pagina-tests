<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #app {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 680px;
      padding: 2rem;
    }

    /* ── PANTALLA INICIO ── */
    #screen-start { text-align: center; }
    #screen-start h1 { font-size: 2rem; color: #1a202c; margin-bottom: .5rem; }
    #screen-start p  { color: #718096; margin-bottom: 2rem; }

    /* ── PANTALLA PREGUNTAS ── */
    #progress-bar-wrap {
      background: #e2e8f0;
      border-radius: 999px;
      height: 8px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #4299e1;
      border-radius: 999px;
      transition: width .3s ease;
    }

    #question-counter {
      font-size: .85rem;
      color: #718096;
      margin-bottom: .5rem;
    }

    #question-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    #options { display: flex; flex-direction: column; gap: .75rem; }

    .option-btn {
      background: #f7fafc;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: .85rem 1.1rem;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      color: #2d3748;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #4299e1;
      background: #ebf8ff;
    }
    .option-btn.correct   { border-color: #48bb78; background: #f0fff4; color: #22543d; }
    .option-btn.incorrect { border-color: #fc8181; background: #fff5f5; color: #742a2a; }
    .option-btn:disabled  { cursor: default; }

    #feedback {
      margin-top: 1rem;
      font-weight: 600;
      font-size: .95rem;
      min-height: 1.4rem;
    }
    #feedback.ok  { color: #38a169; }
    #feedback.err { color: #e53e3e; }

    #btn-next {
      margin-top: 1.5rem;
      display: none;
    }

    /* ── PANTALLA RESULTADO ── */
    #screen-result { text-align: center; }
    #score-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: #ebf8ff;
      border: 6px solid #4299e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    #score-number { font-size: 2.2rem; font-weight: 700; color: #2b6cb0; }
    #score-label  { font-size: .75rem; color: #718096; }
    #result-msg   { font-size: 1.1rem; color: #4a5568; margin-bottom: 1.5rem; }

    #review { text-align: left; margin-bottom: 1.5rem; }
    #review h3 { font-size: 1rem; font-weight: 600; color: #2d3748; margin-bottom: .75rem; }
    .review-item { margin-bottom: .75rem; font-size: .9rem; line-height: 1.5; }
    .review-item .ri-q { color: #4a5568; font-weight: 500; }
    .review-item .ri-correct   { color: #38a169; }
    .review-item .ri-incorrect { color: #e53e3e; }

    /* ── BOTONES GENERALES ── */
    .btn {
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .75rem 1.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #3182ce; }
    .btn.secondary {
      background: #e2e8f0;
      color: #2d3748;
    }
    .btn.secondary:hover { background: #cbd5e0; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- INICIO -->
  <div id="screen-start">
    <h1 id="test-title">Test Licencia de Armas</h1>
    <p id="test-description">Selecciona el tema y responde 20 preguntas aleatorias.</p>

    <div style="margin-bottom:1.5rem;">
      <label for="tema-select" style="display:block;font-weight:600;margin-bottom:.5rem;color:#2d3748;">Tema:</label>
      <select id="tema-select" style="width:100%;padding:.65rem 1rem;border:2px solid #e2e8f0;border-radius:8px;font-size:1rem;color:#2d3748;background:#f7fafc;">
        <option value="all">Todos los temas</option>
        <option value="tema-1.json">Tema 1 – Armas (Licencia E y D)</option>
        <option value="tema-2.json">Tema 2 – Reglamento de Armas</option>
      </select>
    </div>

    <button class="btn" onclick="startTest()">Comenzar</button>
    <p id="load-error" style="color:#e53e3e;margin-top:1rem;display:none;"></p>
  </div>

  <!-- PREGUNTAS -->
  <div id="screen-quiz" class="hidden">
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="question-counter"></div>
    <div id="question-text"></div>
    <div id="options"></div>
    <div id="feedback"></div>
    <button id="btn-next" class="btn" onclick="nextQuestion()">Siguiente →</button>
  </div>

  <!-- RESULTADO -->
  <div id="screen-result" class="hidden">
    <div id="score-circle">
      <span id="score-number"></span>
      <span id="score-label"></span>
    </div>
    <p id="result-msg"></p>
    <div id="review"></div>
    <button class="btn" onclick="restartTest()">Reintentar</button>
  </div>

</div>

<script>
// ════════════════════════════════════════════════
//  CONFIGURACIÓN
// ════════════════════════════════════════════════
const CONFIG = {
  numQuestions: 20,      // preguntas por test
  shuffleOptions: true,  // barajar opciones
};

const JSON_FILES = ['tema-1.json', 'tema-2.json'];

// ════════════════════════════════════════════════

let current = 0;
let score   = 0;
let answered = false;
let activeQuestions = [];
let userAnswers = [];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - .5);
}

// Extrae todas las preguntas con answer != null de un objeto JSON de tema
function extractQuestions(data) {
  const questions = [];
  for (const temaKey of Object.keys(data)) {
    const temaData = data[temaKey];
    for (const subtopic of Object.keys(temaData)) {
      for (const q of temaData[subtopic]) {
        if (q.answer !== null && q.answer !== undefined) {
          questions.push(q);
        }
      }
    }
  }
  return questions;
}

async function loadQuestions(files) {
  let all = [];
  for (const file of files) {
    try {
      const res = await fetch(file);
      if (!res.ok) throw new Error(`No se pudo cargar ${file}`);
      const data = await res.json();
      all = all.concat(extractQuestions(data));
    } catch(e) {
      console.warn(e);
    }
  }
  return all;
}

async function startTest() {
  const select = document.getElementById('tema-select');
  const errEl  = document.getElementById('load-error');
  errEl.style.display = 'none';

  const files = select.value === 'all' ? JSON_FILES : [select.value];

  let pool;
  try {
    pool = await loadQuestions(files);
  } catch(e) {
    errEl.textContent = 'Error al cargar las preguntas. Asegúrate de servir el proyecto con un servidor local.';
    errEl.style.display = 'block';
    return;
  }

  if (pool.length === 0) {
    errEl.textContent = 'No hay preguntas disponibles con respuesta correcta definida en los JSON seleccionados.';
    errEl.style.display = 'block';
    return;
  }

  const n = Math.min(CONFIG.numQuestions, pool.length);
  let selected = shuffle(pool).slice(0, n);

  // Barajar opciones si está activado, actualizando el índice de answer
  if (CONFIG.shuffleOptions) {
    selected = selected.map(q => {
      const correctText = q.options[q.answer];
      const opts = shuffle(q.options);
      return { q: q.q, options: opts, answer: opts.indexOf(correctText) };
    });
  }

  activeQuestions = selected;
  current = 0; score = 0; userAnswers = [];
  show('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = activeQuestions[current];

  document.getElementById('progress-bar').style.width =
    ((current / activeQuestions.length) * 100) + '%';
  document.getElementById('question-counter').textContent =
    `Pregunta ${current + 1} de ${activeQuestions.length}`;
  document.getElementById('question-text').textContent = q.q;

  const container = document.getElementById('options');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('btn-next').style.display = 'none';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q    = activeQuestions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = index === q.answer;
  btns[index].classList.add(isCorrect ? 'correct' : 'incorrect');
  if (!isCorrect) btns[q.answer].classList.add('correct');

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.textContent = '✓ ¡Correcto!';
    fb.className = 'ok';
    score++;
  } else {
    fb.textContent = `✗ Incorrecto. La respuesta correcta es: "${q.options[q.answer]}"`;
    fb.className = 'err';
  }

  userAnswers.push({ q: q.q, chosen: q.options[index], correct: q.options[q.answer], ok: isCorrect });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current + 1 < activeQuestions.length ? 'Siguiente →' : 'Ver resultado';
  nextBtn.style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current < activeQuestions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('progress-bar').style.width = '100%';
  const total = activeQuestions.length;
  const pct   = Math.round((score / total) * 100);

  document.getElementById('score-number').textContent = `${score}/${total}`;
  document.getElementById('score-label').textContent  = `${pct}%`;

  let msg = '';
  if (pct === 100) msg = '¡Perfecto! Todo correcto 🎉';
  else if (pct >= 80) msg = '¡Muy bien! Casi perfecto.';
  else if (pct >= 60) msg = 'Bien, pero puedes mejorar.';
  else if (pct >= 40) msg = 'Regular. Repasa el tema.';
  else msg = 'Necesitas estudiar más. ¡Ánimo!';
  document.getElementById('result-msg').textContent = msg;

  const reviewEl = document.getElementById('review');
  reviewEl.innerHTML = '<h3>Revisión de respuestas</h3>';
  userAnswers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `<span class="ri-q">${i+1}. ${a.q}</span><br>` +
      (a.ok
        ? `<span class="ri-correct">✓ ${a.chosen}</span>`
        : `<span class="ri-incorrect">✗ Tu respuesta: ${a.chosen}</span>` +
          `<br><span class="ri-correct">✓ Correcta: ${a.correct}</span>`);
    reviewEl.appendChild(div);
  });

  show('screen-result');
}

function restartTest() {
  show('screen-start');
}

function show(id) {
  ['screen-start','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
</script>
</body>
</html>
